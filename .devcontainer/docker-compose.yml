version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ../..:/workspaces:cached

    # Increase shared memory for Chrome to run in Fluxbox
    shm_size: "2gb"

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    # (Although we're not sure if our port forwarding is actually doing any good)
    network_mode: service:postgres

  postgres:
    # Pin a stable major version. `postgres:latest` is now PG18, whose Docker
    # image refuses to start against the legacy /var/lib/postgresql/data mount
    # layout this compose file uses (it wants the mount one level up). Pinning
    # avoids that and keeps the DB version reproducible across hosts.
    image: postgres:16
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
    ports:
     - "5432:5432" # For non-devcontainer local usage
volumes:
  postgres-data:
